{% extends "base.html" %}
{% block title %}Register - AI Teacher Platform{% endblock %}
{% block auth_content %}
<div class="glass-card shadow-2xl p-10 transform transition-all hover:scale-[1.01]">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-800">Create Account</h2>
        <p class="text-slate-500 text-sm mt-1">Join the teacher upskilling journey</p>
    </div>

    <form class="space-y-5" action="{{ url_for('auth.register') }}" method="POST">
        <div>
            <label for="name" class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                    <i class="fa-solid fa-user"></i>
                </div>
                <input id="name" name="name" type="text" required 
                    class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400" 
                    placeholder="Full Name">
            </div>
        </div>

        <div>
            <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <input id="email" name="email" type="email" required 
                    class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400" 
                    placeholder="Email">
            </div>
        </div>

        <div>
            <label for="district_id" class="block text-sm font-semibold text-slate-700 mb-2">District</label>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <select id="district_id" name="district_id" required 
                    class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all appearance-none bg-white">
                    <option value="" disabled selected>Select your district</option>
                    {% for district in districts %}
                    <option value="{{ district.id }}">{{ district.district_name }}</option>
                    {% endfor %}
                </select>
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                </div>
            </div>
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <input id="password" name="password" type="password" required 
                    class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="Password">
            </div>
        </div>

        <div class="pt-2">
            <button type="submit" class="w-full btn-premium">
                Create Account
            </button>
        </div>
    </form>
    
    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <p class="text-sm text-slate-600">Already have an account? 
            <a href="{{ url_for('auth.login') }}" class="font-bold text-indigo-600 hover:text-indigo-700 transition-colors">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
