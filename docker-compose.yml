version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: teacher_platform
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  web:
    build: .
    restart: always
    ports:
      - "5001:5001"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=user_password
      - MYSQL_DB=teacher_platform
      - SECRET_KEY=production-secret-key-change-me
    depends_on:
      - db

volumes:
  db_data:
